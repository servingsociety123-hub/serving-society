<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Serving Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #5E2D6E; --purple-dark: #4A2356; --purple-light: #F4ECF7;
      --lime: #C6DA02; --grey-200: #E5E5E5; --grey-500: #7A7A7A;
      --text: #1D1D1B; --radius: 10px;
    }
    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #4A2356 0%, #5E2D6E 50%, #7B3F8A 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      width: 100%; max-width: 420px;
      padding: 48px 40px 40px;
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo img { height: 56px; }
    .login-logo-label {
      font-size: .72rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--grey-500);
    }

    .login-title {
      font-size: 1.35rem; font-weight: 800; color: var(--purple);
      text-align: center; margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: .85rem; color: var(--grey-500);
      text-align: center; margin-bottom: 32px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .form-group label {
      font-size: .78rem; font-weight: 700; color: var(--text);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .form-group input {
      padding: 12px 14px; font-family: inherit; font-size: .95rem;
      border: 1.5px solid var(--grey-200); border-radius: var(--radius);
      color: var(--text); transition: border-color .2s;
      background: #FAFAFA;
    }
    .form-group input:focus { outline: none; border-color: var(--purple); background: #fff; }
    .form-group input.invalid { border-color: #C62828; }

    .login-btn {
      width: 100%; padding: 14px;
      background: var(--purple); color: #fff;
      border: none; border-radius: 100px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover { background: var(--purple-dark); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .login-error {
      display: none; margin-top: 16px;
      background: #FFEBEE; border: 1px solid #EF9A9A;
      color: #C62828; border-radius: var(--radius);
      padding: 12px 14px; font-size: .85rem; font-weight: 600;
      text-align: center;
    }
    .login-error.show { display: block; }

    .login-footer {
      margin-top: 28px; text-align: center;
      font-size: .75rem; color: var(--grey-500);
    }
    .login-footer a { color: var(--purple); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    /* spinner */
    .spinner {
      width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .login-btn.loading .spinner { display: block; }
    .login-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="/Logo Serving Society.png" alt="Serving Society" />
      <span class="login-logo-label">Admin Portal</span>
    </div>

    <h1 class="login-title">Welcome Back</h1>
    <p class="login-subtitle">Sign in to access the Serving Society admin panel.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="admin@servingsociety.com.au" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Sign In</span>
      </button>

      <div class="login-error" id="loginError"></div>
    </form>

    <div class="login-footer">
      <a href="/index.html">← Back to Website</a>
    </div>
  </div>

  <script>
    // If already logged in, go straight to admin
    const _sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    _sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.replace('/admin.html');
    });

    const form     = document.getElementById('loginForm');
    const btn      = document.getElementById('loginBtn');
    const errorEl  = document.getElementById('loginError');
    const emailEl  = document.getElementById('loginEmail');
    const passEl   = document.getElementById('loginPassword');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      [emailEl, passEl].forEach(f => f.classList.remove('invalid'));

      let valid = true;
      if (!emailEl.value.trim()) { emailEl.classList.add('invalid'); valid = false; }
      if (!passEl.value.trim())  { passEl.classList.add('invalid');  valid = false; }
      if (!valid) return;

      btn.classList.add('loading');
      btn.disabled = true;

      const { error } = await _sb.auth.signInWithPassword({
        email:    emailEl.value.trim(),
        password: passEl.value,
      });

      btn.classList.remove('loading');
      btn.disabled = false;

      if (error) {
        errorEl.textContent = error.message === 'Invalid login credentials'
          ? 'Incorrect email or password. Please try again.'
          : error.message;
        errorEl.classList.add('show');
        passEl.value = '';
        passEl.classList.add('invalid');
      } else {
        window.location.replace('/admin.html');
      }
    });

    [emailEl, passEl].forEach(f => f.addEventListener('input', () => {
      f.classList.remove('invalid');
      errorEl.classList.remove('show');
    }));
  </script>

</body>
</html>
